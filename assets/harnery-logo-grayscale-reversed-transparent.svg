<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000" role="img" aria-label="HARNERY logo (grayscale reversed)">
  <title>HARNERY logo (grayscale reversed)</title>
  <defs>
    <linearGradient id="hny-orange" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#FB6E26"/>
      <stop offset="0.14" stop-color="#F25A0E"/>
      <stop offset="0.86" stop-color="#EA5208"/>
      <stop offset="1"    stop-color="#CD4705"/>
    </linearGradient>
    <linearGradient id="hny-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#0F8497"/>
      <stop offset="0.14" stop-color="#06738A"/>
      <stop offset="0.86" stop-color="#04657A"/>
      <stop offset="1"    stop-color="#024250"/>
    </linearGradient>
    <linearGradient id="hny-strap" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#454E56"/>
      <stop offset="0.5"  stop-color="#353C43"/>
      <stop offset="1"    stop-color="#232931"/>
    </linearGradient>
    <filter id="hny-shadow" color-interpolation-filters="sRGB" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5.54"/>
      <feOffset dx="0" dy="4.85"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.26"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="hny-strap1-clip"><path d="M 755.97,271.62 Q 755.97,259.73 745.41,265.22 L 252.86,487.79 Q 242.31,493.28 242.31,505.17 L 242.31,610.05 Q 242.31,621.94 252.86,616.45 L 745.41,393.89 Q 755.97,388.4 755.97,376.51 L 755.97,271.62 Z"/></clipPath>
    <clipPath id="hny-strap2-clip"><path d="M 242.31,270.59 Q 242.31,258.7 252.86,264.19 L 745.41,486.75 Q 755.97,492.24 755.97,504.13 L 755.97,609.02 Q 755.97,620.91 745.41,615.42 L 252.86,392.85 Q 242.31,387.36 242.31,375.47 L 242.31,270.59 Z"/></clipPath>
    <!-- pillar-block clips: bevels are drawn past the edges and clipped to the block so they reach the rounded corners -->
    <clipPath id="hny-otop-clip"><rect x="248.53" y="116.56" width="126.63" height="241.84" rx="4.85"/></clipPath>
    <clipPath id="hny-obot-clip"><rect x="248.53" y="525.86" width="126.63" height="219.36" rx="4.85"/></clipPath>
    <clipPath id="hny-ttop-clip"><rect x="630.89" y="116.56" width="120.57" height="241.84" rx="4.85"/></clipPath>
    <clipPath id="hny-tbot-clip"><rect x="630.89" y="525.86" width="120.57" height="219.36" rx="4.85"/></clipPath>
  <filter id="hny-desat" color-interpolation-filters="sRGB"><feColorMatrix type="saturate" values="0"/></filter></defs>
  <g filter="url(#hny-desat)"><g id="hny-emblem">
  <!-- pillar blocks: split top/bottom, white center gap -->
  <g filter="url(#hny-shadow)">
    <!-- orange top -->
    <rect x="248.53" y="116.56" width="126.63" height="241.84" rx="4.85" fill="url(#hny-orange)"/>
    <!-- bevels reach the corners: drawn to the block edges, clipped to the rounded block; top highlight + right shadow miter at a 45 deg seam -->
    <g clip-path="url(#hny-otop-clip)">
      <polygon points="248.53,116.56 375.16,116.56 365.25,126.46 248.53,126.46" fill="#FFA66B" opacity="0.24"/>
      <polygon points="375.16,116.56 375.16,358.4 365.25,358.4 365.25,126.46" fill="#8C3203" opacity="0.4"/>
    </g>
    <!-- orange bottom -->
    <rect x="248.53" y="525.86" width="126.63" height="219.36" rx="4.85" fill="url(#hny-orange)"/>
    <g clip-path="url(#hny-obot-clip)">
      <polygon points="375.16,525.86 375.16,745.22 365.25,745.22 365.25,525.86" fill="#8C3203" opacity="0.4"/>
    </g>
    <!-- teal top -->
    <rect x="630.89" y="116.56" width="120.57" height="241.84" rx="4.85" fill="url(#hny-teal)"/>
    <g clip-path="url(#hny-ttop-clip)">
      <polygon points="630.89,116.56 751.47,116.56 741.56,126.46 630.89,126.46" fill="#5BBACB" opacity="0.22"/>
      <polygon points="751.47,116.56 751.47,358.4 741.56,358.4 741.56,126.46" fill="#02333E" opacity="0.44"/>
    </g>
    <!-- teal bottom -->
    <rect x="630.89" y="525.86" width="120.57" height="219.36" rx="4.85" fill="url(#hny-teal)"/>
    <g clip-path="url(#hny-tbot-clip)">
      <polygon points="751.47,525.86 751.47,745.22 741.56,745.22 741.56,525.86" fill="#02333E" opacity="0.44"/>
    </g>
  </g>

  <!-- crossing straps: parallelograms, vertical end-cuts (B under, A over) -->
  <g filter="url(#hny-shadow)"><g clip-path="url(#hny-strap2-clip)">
    <polygon points="242.31,258.7 755.97,492.24 755.97,620.91 242.31,387.36" fill="url(#hny-strap)"/>
    <polygon points="242.31,258.7 755.97,492.24 755.97,503.82 242.31,270.27" fill="#5A636B" opacity="0.5"/>
    <polygon points="242.31,370.95 755.97,604.49 755.97,620.91 242.31,387.36" fill="#14191E" opacity="0.6"/>
  </g></g>
  <g filter="url(#hny-shadow)"><g clip-path="url(#hny-strap1-clip)">
    <polygon points="755.97,259.73 242.31,493.28 242.31,621.94 755.97,388.4" fill="url(#hny-strap)"/>
    <polygon points="755.97,259.73 242.31,493.28 242.31,504.85 755.97,271.31" fill="#5A636B" opacity="0.5"/>   <!-- top bevel -->
    <polygon points="242.31,605.53 755.97,371.99 755.97,388.4 242.31,621.94" fill="#14191E" opacity="0.6"/> <!-- underside -->
  </g></g>

  </g><!-- /hny-emblem --></g>
