name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: Lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      # Integration tests are bash-based: they shell out to `bin/harn` and
      # assert on stdout/stderr + filesystem side effects. Skipped on PRs from
      # forks (the HARNERY_COORD_ROOT_OVERRIDE sandbox requires a writable tmp dir,
      # which Actions provides, but the test script assumes a specific repo
      # layout we set up via the integration runner).
      - name: Integration tests
        run: bun run test:integration
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'

  smoke:
    name: Published-package smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Builds dist/, packs the tarball, installs it with production deps only,
    # and runs the CLI via `node dist/cli.js`. This is the gate the 0.2.0 launch
    # lacked: tests/lint/typecheck/build all run against source under Bun and
    # missed three crashes that only appeared in a plain `node` install with no
    # dev deps (eager `typescript`/`jsdom` imports, jsdom's ESM-broken tree).
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      # Node is what an end user runs the published package with; the smoke
      # script invokes the CLI via `node` (process.execPath) so it must be Node.
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Run with Node (not `bun run`) so process.execPath inside the script is
      # the Node binary, exercising the real end-user runtime.
      - name: Smoke test (build, pack, install --omit=dev, run on Node)
        run: node scripts/smoke-test.mjs

  installers:
    name: Installer scripts smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12
    # Locks the shell install surface the unit/integration suites don't cover:
    # the hosted curl|bash one-liners (docs/public/{install,uninstall}.sh) and the
    # git-clone scripts (scripts/{setup,teardown}.sh). No secrets, so it runs on
    # all PRs.
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build dist
        run: bun run build

      - name: Pack tarball
        id: pack
        run: echo "tgz=$(npm pack --silent | tail -1)" >> "$GITHUB_OUTPUT"

      # Hosted installer + uninstaller, installing the freshly-packed tarball into a
      # throwaway prefix (HARNERY_INSTALL_SOURCE), via both package managers.
      - name: Hosted installer smoke (npm)
        run: bash scripts/installer-smoke.sh --method npm --tarball "${{ steps.pack.outputs.tgz }}"

      - name: Hosted installer smoke (bun)
        run: bash scripts/installer-smoke.sh --method bun --tarball "${{ steps.pack.outputs.tgz }}"

      # Clone scripts: wire then unwire a throwaway project. `< /dev/null` keeps
      # teardown.sh non-interactive even if a runner ever attaches a TTY.
      - name: Clone scripts smoke (setup.sh + teardown.sh)
        run: |
          proj="$RUNNER_TEMP/proj"
          mkdir -p "$proj"
          bash scripts/setup.sh --project-root "$proj" --no-link < /dev/null
          if [ ! -d "$proj/.harnery" ]; then echo "FAIL: setup.sh did not create .harnery/"; exit 1; fi
          if [ ! -f "$proj/.claude/settings.json" ]; then echo "FAIL: setup.sh did not wire hooks"; exit 1; fi
          grep -q 'agent-hook' "$proj/.claude/settings.json"
          bash scripts/teardown.sh --project-root "$proj" --purge-state < /dev/null
          if [ -d "$proj/.harnery" ]; then echo "FAIL: teardown.sh --purge-state left .harnery/"; exit 1; fi
          echo "clone scripts OK"
