name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: Lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (Biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Unit tests
        run: bun run test

      # Integration tests are bash-based: they shell out to `bin/harn` and
      # assert on stdout/stderr + filesystem side effects. Skipped on PRs from
      # forks (the HARNERY_COORD_ROOT_OVERRIDE sandbox requires a writable tmp dir,
      # which Actions provides, but the test script assumes a specific repo
      # layout we set up via the integration runner).
      - name: Integration tests
        run: bun run test:integration
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name == 'push'
