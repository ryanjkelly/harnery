name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write   # for npm provenance attestation

concurrency:
  group: release-${{ github.ref }}

jobs:
  release:
    name: Publish via changesets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Map the secret to a job-level env so the publish step can be gated on it.
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Setup Node (for npm publish)
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Skips cleanly (job stays green) until an NPM_TOKEN secret is configured.
      # Set NPM_TOKEN in repo secrets when you're ready to publish to npm.
      - name: Create release PR or publish
        if: ${{ env.NPM_TOKEN != '' }}
        uses: changesets/action@v1
        with:
          # The publish command runs only after merging the release PR that
          # changesets opens. Until then, this step only opens/updates the PR.
          publish: bun x changeset publish
          version: bun x changeset version
          commit: "chore(release): version bump + changelog"
          title: "chore(release): version bump + changelog"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
