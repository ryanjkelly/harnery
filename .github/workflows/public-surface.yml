name: Public surface

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  provenance:
    name: Source-neutral public artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.x

      - name: Scan public surface
        run: bun run check:public-surface
